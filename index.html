/* BUILDER_REORDER_MODE_V11 */
.legsTitleRow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
.reorderToggle{display:none;width:auto;min-width:126px;padding:9px 11px;font-size:11px}
.reorderToggle.visible{display:inline-flex;align-items:center;justify-content:center}
.reorderToggle.active{background:linear-gradient(180deg,#f8fbff,#d7dee8 48%,#7e8a99);border-color:rgba(105,116,130,.65);color:#111820}
.leg .headControls{display:flex;align-items:center;justify-content:flex-end;gap:14px}
.leg .grip{display:none}
.leg .miniRemove{display:none;width:42px;height:34px;padding:0}
.leg .miniRemove.preReorderVisible{display:inline-flex}
body:not(.reorderMode) #legs>.leg{margin-top:12px;padding:12px;border:1px solid rgba(255,255,255,.8);border-radius:10px;background:linear-gradient(180deg,rgba(252,253,255,.78),rgba(181,192,207,.64));box-shadow:inset 0 1px 0 rgba(255,255,255,.92),0 3px 9px rgba(0,0,0,.14)}
body:not(.reorderMode) #legs>.leg+.leg{margin-top:14px}
body.reorderMode .leg{margin-top:10px;padding:11px 10px;border:1px solid rgba(255,255,255,.72);border-radius:10px;background:linear-gradient(180deg,rgba(250,252,255,.86),rgba(197,206,218,.82));box-shadow:inset 0 1px 0 rgba(255,255,255,.88),0 3px 8px rgba(0,0,0,.12);touch-action:pan-y;-webkit-user-select:none;user-select:none}
body.reorderMode .leg.straightInactive{opacity:1;filter:none}
body.reorderMode .leg > :not(.legHead){display:none!important}
body.reorderMode .legHead{position:relative;display:grid;grid-template-columns:minmax(0,1fr) 84px minmax(0,1fr);align-items:center;gap:0;margin:0;min-height:44px}
body.reorderMode .legHeadLeft{grid-column:1;min-width:0;padding-right:8px}
body.reorderMode .leg .headControls{display:contents}
body.reorderMode .leg .grip{display:inline-flex!important;grid-column:2;justify-self:center;width:84px;height:38px;cursor:grab;touch-action:pan-y;-webkit-user-select:none;user-select:none}
body.reorderMode .leg .miniRemove{display:inline-flex!important;position:absolute;right:0;top:50%;transform:translateY(-50%);width:65px;height:38px;padding:0 6px;font-size:9px}
body.reorderMode .straightPick{display:none!important}
.reorderSummary{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#66717f;font-size:11px;font-weight:750;letter-spacing:0;text-transform:none}
.leg.reorderDragging{opacity:.84!important;filter:none!important;position:relative;z-index:30;transform:scale(1.015);box-shadow:0 12px 24px rgba(0,0,0,.24)!important}
body.reorderDraggingActive{overflow:hidden!important;overscroll-behavior:none;touch-action:none}
body.reorderDraggingActive .leg{touch-action:none!important}
body.reorderDraggingActive .grip{cursor:grabbing!important;touch-action:none!important}
.leg.reorderBefore{box-shadow:0 -4px 0 #c89232,inset 0 1px 0 rgba(255,255,255,.88),0 3px 8px rgba(0,0,0,.12)!important}
.reorderHint{display:none;margin:8px 0 2px;text-align:center;color:#596372;font-size:11px;font-weight:750;letter-spacing:.04em}
body.reorderMode .reorderHint{display:block}

function resetBuilderForNew(){builderMode='draft';builderDraftRecord=null;editingTicketId='';$('tracker').value='parlay';$('ticketType').value='sgp';$('ticketLeague').value='MLB';$('date').value=today();$('odds').value='';$('sportsbook').value='DraftKings';$('ticketStatus').value='active';$('ticketGameManual').value='';$('ticketGame').value='';$('legs').innerHTML='';legCount=0;straightActiveLegId='';addLeg();$('saveStatus').textContent='';loadGames();syncLegs();preview();showBuilder()}
function saveCurrentTicket(){preview();const problems=clean($('warnings').textContent);if(problems){$('saveStatus').textContent='Fix the listed ticket issues before saving.';$('saveStatus').className='status bad';return}const list=loadSavedTickets(),idx=list.findIndex(x=>x.id===editingTicketId),existing=idx>=0?list[idx]:null,record=ticketRecordFromBuilder(existing);if(idx>=0)list[idx]=record;else list.push(record);storeSavedTickets(list);editingTicketId=record.id;$('saveStatus').textContent='Ticket saved.';$('saveStatus').className='status good';renderTicketDashboard()}
function renderTicketDashboard(){const list=loadSavedTickets(),box=$('ticketList');if(!list.length){box.innerHTML='<div class="emptyState">No saved tickets yet.</div>';return}box.innerHTML=list.map((r,i)=>{const t=r.ticket||{},meta=[r.sportsbook,t.type?.toUpperCase(),t.date,t.game,`${t.legs?.length||0} legs`].filter(Boolean).join(' · ');return `<article class="savedTicket"><div class="savedTicketTop"><div><span class="bookBadge">${esc(r.sportsbook||'Other')}</span><h3>${esc(t.title||'Untitled')}</h3><div class="savedMeta">${esc(meta)}<br>${esc((r.status||'active').toUpperCase())}</div></div><div class="savedOrder"><button class="ghost" type="button" onclick="moveSavedTicket('${r.id}',-1)" ${i===0?'disabled':''}>↑</button><button class="ghost" type="button" onclick="moveSavedTicket('${r.id}',1)" ${i===list.length-1?'disabled':''}>↓</button></div></div><div class="savedActions"><button class="ghost" type="button" onclick="openSavedTicketView('${r.id}')">View</button><button class="ghost" type="button" onclick="editSavedTicket('${r.id}')">Edit</button><button class="ghost" type="button" onclick="duplicateSavedTicket('${r.id}')">Duplicate</button><button class="ghost" type="button" onclick="copySavedTicketCode('${r.id}')">Copy Code</button><button class="ghost" type="button" onclick="toggleSavedTicketStatus('${r.id}')">${r.status==='completed'?'Mark Active':'Complete'}</button><button type="button" onclick="deleteSavedTicket('${r.id}')">Delete</button></div></article>`}).join('')}
function moveSavedTicket(id,delta){const list=loadSavedTickets(),i=list.findIndex(x=>x.id===id),j=i+delta;if(i<0||j<0||j>=list.length)return;[list[i],list[j]]=[list[j],list[i]];storeSavedTickets(list);renderTicketDashboard()}
function deleteSavedTicket(id){if(!confirm('Delete this saved ticket?'))return;storeSavedTickets(loadSavedTickets().filter(x=>x.id!==id));if(editingTicketId===id)editingTicketId='';renderTicketDashboard()}
function duplicateSavedTicket(id){const list=loadSavedTickets(),src=list.find(x=>x.id===id);if(!src)return;const now=new Date().toISOString(),copy=JSON.parse(JSON.stringify(src));copy.id=makeTicketId();copy.createdAt=now;copy.updatedAt=now;copy.ticket.title=(copy.ticket.title||'Untitled')+' Copy';copy.canonical.title=(copy.canonical.title||'Untitled')+' Copy';list.push(copy);storeSavedTickets(list);renderTicketDashboard()}
function toggleSavedTicketStatus(id){const list=loadSavedTickets(),r=list.find(x=>x.id===id);if(!r)return;r.status=r.status==='completed'?'active':'completed';r.updatedAt=new Date().toISOString();storeSavedTickets(list);renderTicketDashboard()}
async function copySavedTicketCode(id){const r=loadSavedTickets().find(x=>x.id===id);if(!r)return;const code=formatTicket(r.canonical);try{await navigator.clipboard.writeText(code)}catch(e){const ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}alert('Ticket code copied.')}
function editSavedTicket(id){const r=loadSavedTickets().find(x=>x.id===id);if(!r)return;captureBuilderDraft();builderMode='edit';loadRecordIntoBuilder(r);showBuilder()}
function returnToBuilderDraft(){if(builderMode==='edit'){if(builderDraftRecord){loadRecordIntoBuilder(builderDraftRecord);$('saveStatus').textContent='Builder restored.';$('saveStatus').className='status'}else{resetBuilderForNew();return}builderMode='draft'}showBuilder()}
function loadRecordIntoBuilder(r){editingTicketId=r.id;const t=r.ticket||{};$('tracker').value=t.tracker||'parlay';$('ticketLeagueWrap').classList.toggle('hide',$('tracker').value==='worldcup');$('ticketType').value=t.type||'sgp';$('ticketLeague').value=t.league&&t.league!=='WC'?t.league:'MLB';$('date').value=isoToInput(t.date)||today();$('odds').value=t.title||'';$('sportsbook').value=[...$('sportsbook').options].some(o=>o.value===r.sportsbook)?r.sportsbook:'Other';$('ticketStatus').value=r.status||'active';setPairValue($('ticketGame'),$('ticketGameManual'),t.game);$('legs').innerHTML='';straightActiveLegId='';(t.legs||[]).forEach((leg,index)=>{addLeg();const d=[...document.querySelectorAll('.leg')].at(-1);d.querySelector('.ldate').value=isoToInput(leg.date||t.date);d.querySelector('.lleague').value=leg.league||t.league||'MLB';setTypes(d);d.querySelector('.ltype').value=leg.type;setPairValue(d.querySelector('.lgame'),d.querySelector('.lgameManual'),leg.game||t.game);refreshLeg(d);setPairValue(d.querySelector('.team'),d.querySelector('.teamManual'),leg.team);loadPlayers(d);setPairValue(d.querySelector('.player'),d.querySelector('.playerManual'),leg.player);setTargetForLeg(d,leg.target);if(leg.half)d.querySelector('.half').value=String(leg.half);d.querySelector('.lbl').value=leg.label||autoLabel(d);d.querySelector('.lbl').dataset.auto='0';if(index===0)straightActiveLegId=d.dataset.legId});if(!(t.legs||[]).length)addLeg();updateMultiControls();syncLegs();preview();$('saveStatus').textContent='Editing saved ticket.';$('saveStatus').className='status'}
function ticketCardHtml(r){const t=r.ticket||{};return `<div class="liveTicketCard"><div class="ticketTop"><div><span class="bookBadge">${esc(r.sportsbook||'Other')}</span><span class="title">${esc(t.title||'Untitled')}</span></div><span class="badge">${esc((t.type||'').toUpperCase())}</span></div><div class="meta">${esc([t.game,t.date,(r.status||'active').toUpperCase()].filter(Boolean).join(' · '))}</div>${(t.legs||[]).map(l=>`<div class="pline"><div><b>${esc(l.label||'Untitled')}</b><div class="sub">${esc([l.game,l.team,l.player].filter(Boolean).join(' · '))}</div></div><div>${esc(l.target??'')}</div></div>`).join('')}</div>`}
function renderStandaloneMode(){const hash=location.hash.slice(1),params=new URLSearchParams(hash),id=params.get('ticket'),active=params.get('view')==='active';if(!id&&!active)return false;document.querySelectorAll('.builderOnly').forEach(x=>x.classList.add('hide'));$('dashboardView').classList.add('hide');$('appTabs').classList.add('hide');$('standaloneView').classList.remove('hide');const list=loadSavedTickets(),items=active?list.filter(x=>x.status!=='completed'):list.filter(x=>x.id===id);$('standaloneView').innerHTML=`<div class="standaloneTools"><button class="ghost" type="button" onclick="closeStandaloneViewer()">Close</button><button class="ghost" type="button" onclick="location.reload()">Refresh</button></div><div class="dashboardHeader"><h2>${active?'ACTIVE TICKETS':'TICKET VIEW'}</h2></div><div class="liveGrid">${items.length?items.map(ticketCardHtml).join(''):'<div class="emptyState">Ticket not found on this device.</div>'}</div><div class="phaseNote">This local view reflects saved ticket data. Live game-state polling is the next layer.</div>`;return true}
function openViewer(hash){const viewer=window.open(location.href.split('#')[0]+hash,VIEWER_WINDOW_NAME);viewer?.focus?.()}
function openSavedTicketView(id){openViewer('#ticket='+encodeURIComponent(id))}
function openActiveTicketsView(){openViewer('#view=active')}
function closeStandaloneViewer(){window.close();setTimeout(()=>{if(!window.closed){location.href=location.href.split('#')[0]}},120)}
window.addEventListener('load',()=>{if(renderStandaloneMode())return;$('ticketsTab').addEventListener('click',showDashboard);$('builderTab').addEventListener('click',returnToBuilderDraft);$('newTicketBtn').addEventListener('click',resetBuilderForNew);$('backToTicketsBtn').addEventListener('click',showDashboard);$('saveTicketBtn').addEventListener('click',saveCurrentTicket);$('viewActiveBtn').addEventListener('click',openActiveTicketsView);showDashboard()});

</script>
