<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Parlay Tracker</title>
<link rel="icon" href="https://superl0ng.github.io/parlay-tracker/favicon.ico" sizes="any">
<link rel="shortcut icon" href="https://superl0ng.github.io/parlay-tracker/favicon.ico">
<link rel="icon" type="image/png" sizes="64x64" href="https://superl0ng.github.io/parlay-tracker/ssb-favicon-v3-64.png">
<link rel="icon" type="image/png" sizes="128x128" href="https://superl0ng.github.io/parlay-tracker/ssb-favicon-v3-128.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://superl0ng.github.io/parlay-tracker/ssb-touch-v3-180.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="https://superl0ng.github.io/parlay-tracker/ssb-touch-v3-180.png">
<link rel="manifest" href="/manifest.json?v=1">
<meta name="theme-color" content="#d7dde6">
<meta name="apple-mobile-web-app-title" content="Parlay Tracker">
<meta property="og:type" content="website">
<meta property="og:title" content="Parlay Tracker">
<meta property="og:description" content="Simon Sports Betting Parlay Tracker">
<meta property="og:url" content="https://simonsports.bet/">
<meta property="og:image" content="https://superl0ng.github.io/parlay-tracker/ssb-share-v3.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="https://superl0ng.github.io/parlay-tracker/ssb-share-v3.png">
<style>html,body{margin:0;min-height:100%;background:#cbd2dc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#374151}.boot{padding:28px 18px;text-align:center;font-weight:800;letter-spacing:.06em}</style>
</head>
<body>
<div class="boot">Loading Parlay Tracker…</div>
<script>
(async()=>{
  const sourcePage='https://simonsportsbetting.com/?mirror='+Date.now();
  const assetBase='https://superl0ng.github.io/parlay-tracker/';
  const silverHead='<link rel="icon" href="'+assetBase+'favicon.ico" sizes="any"><link rel="shortcut icon" href="'+assetBase+'favicon.ico"><link rel="icon" type="image/png" sizes="64x64" href="'+assetBase+'ssb-favicon-v3-64.png"><link rel="icon" type="image/png" sizes="128x128" href="'+assetBase+'ssb-favicon-v3-128.png"><link rel="apple-touch-icon" sizes="180x180" href="'+assetBase+'ssb-touch-v3-180.png"><link rel="apple-touch-icon-precomposed" sizes="180x180" href="'+assetBase+'ssb-touch-v3-180.png"><link rel="manifest" href="/manifest.json?v=1"><meta name="theme-color" content="#d7dde6"><meta name="apple-mobile-web-app-title" content="Parlay Tracker"><meta property="og:url" content="https://simonsports.bet/">';
  try{
    const response=await fetch(sourcePage,{cache:'no-store'});
    if(!response.ok)throw new Error('Source app HTTP '+response.status);
    let html=await response.text();
    html=html.replace(/(?:src|href)=(['"])\.\//g,(match,quote)=>match.slice(0,match.indexOf(quote)+1)+assetBase);
    html=html.replace(/(['"])\.\//g,(match,quote)=>quote+assetBase);
    html=html.replace(/<link\b(?=[^>]*\brel=["'](?:icon|shortcut icon|apple-touch-icon(?:-precomposed)?|manifest)["'])[^>]*>\s*/gi,'');
    html=html.replace(/<meta\b(?=[^>]*(?:name=["'](?:theme-color|apple-mobile-web-app-title)["']|property=["']og:url["']))[^>]*>\s*/gi,'');
    html=html.replace(/<head([^>]*)>/i,'<head$1><base href="'+assetBase+'">'+silverHead);
    html=html.replace('</head>','<style id="silverRootHost">.top{border-color:rgba(255,255,255,.88)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(44,52,63,.22),0 7px 16px rgba(0,0,0,.13)!important}</style></head>');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.body.innerHTML='<div class="boot">Unable to load Parlay Tracker.<br><small>'+String(error.message||error)+'</small></div>';
  }
})();
</script>
</body>
</html>
