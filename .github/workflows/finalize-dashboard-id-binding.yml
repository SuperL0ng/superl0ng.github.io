name: Finalize dashboard ticket ID binding

on:
  push:
    paths:
      - .github/workflows/finalize-dashboard-id-binding.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch settlement binding and cache keys
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          actual=Path('actual-settlement-time.js')
          text=actual.read_text()
          old="""    const records=id?list.filter(r=>r.id===id):active?list.filter(r=>r.status!=='completed'||document.querySelector('.liveTicketCard')):[];
    [...document.querySelectorAll('#standaloneView .liveTicketCard')].forEach((card,i)=>{
      const r=records[i];card.querySelector('.settlementStamp')?.remove();if(!r?.settledAt)return;"""
          new="""    const records=id?list.filter(r=>r.id===id):active?list.filter(r=>r.status!=='completed'):[];
    const recordsById=new Map(records.map(record=>[String(record.id||''),record]));
    [...document.querySelectorAll('#standaloneView .liveTicketCard')].forEach(card=>{
      const r=recordsById.get(String(card.dataset.ticketId||''));card.querySelector('.settlementStamp')?.remove();if(!r?.settledAt)return;"""
          if old in text:
              text=text.replace(old,new,1)
          elif new not in text:
              raise SystemExit('actual-settlement-time.js: expected old or new settlement binding')
          actual.write_text(text)

          index=Path('index.html')
          text=index.read_text()
          if 's.src="./actual-settlement-time.js?v=120"' in text:
              text=text.replace('s.src="./actual-settlement-time.js?v=120"','s.src="./actual-settlement-time.js?v=123"',1)
          elif 's.src="./actual-settlement-time.js?v=123"' not in text:
              raise SystemExit('index.html: settlement loader version not recognized')
          if '<script src="./show-legs-label-fix.js?v=2"></script>' in text:
              text=text.replace('<script src="./show-legs-label-fix.js?v=2"></script>','<script src="./show-legs-label-fix.js?v=4"></script>',1)
          elif '<script src="./show-legs-label-fix.js?v=4"></script>' not in text:
              raise SystemExit('index.html: dashboard binding loader not recognized')
          index.write_text(text)
          PY

      - name: Verify final repair
        shell: bash
        run: |
          node --check show-legs-label-fix.js
          node --check actual-settlement-time.js
          node scripts/verify-root-deployment.mjs
          grep -q 'DASHBOARD TICKET ID BINDING V4' show-legs-label-fix.js
          grep -q 'recordsById.get(String(card.dataset.ticketId' actual-settlement-time.js
          grep -q 'actual-settlement-time.js?v=123' index.html
          grep -q 'show-legs-label-fix.js?v=4' index.html

      - name: Commit final repair
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Final repair already present.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add actual-settlement-time.js index.html
          git commit -m "Finalize dashboard ticket ID binding"
          git push
