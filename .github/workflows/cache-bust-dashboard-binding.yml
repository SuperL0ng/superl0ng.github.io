name: Cache-bust dashboard ticket binding

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .dashboard-binding-v4-trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Bump dashboard binding asset version
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('index.html')
          text=path.read_text()
          old='./show-legs-label-fix.js?v=2'
          new='./show-legs-label-fix.js?v=4'
          if new not in text:
              if text.count(old)!=1:
                  raise SystemExit(f'expected one old cache key, found {text.count(old)}')
              path.write_text(text.replace(old,new,1))
          PY
          grep -q 'show-legs-label-fix.js?v=4' index.html
      - name: Commit cache bust
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Cache-bust dashboard ticket binding V4"
          git push origin HEAD:${{ github.head_ref }}
